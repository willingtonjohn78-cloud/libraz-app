<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libra'z Beauty Salon</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Country dropdown component styles (self-contained) -->
    <style>
    /* Modern searchable country dropdown - compact, responsive, light/dark aware */
    :root{
      --cs-bg: #ffffff;
      --cs-border: rgba(139,92,246,0.18);
      --cs-accent: #6d28d9;
      --cs-text: #432d56;
      --cs-muted: #6a4f79;
    }
    @media (prefers-color-scheme: dark){
      :root{--cs-bg:#111014;--cs-border:rgba(139,92,246,0.12);--cs-text:#e6def5;--cs-muted:#bfaee6}
    }
    .country-select-wrapper{display:flex;align-items:center;gap:10px}
    .country-select{position:relative;min-width:260px}
    .country-toggle{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border-radius:12px;background:linear-gradient(180deg,var(--cs-bg),#fbf8ff);border:1px solid var(--cs-border);cursor:pointer;color:var(--cs-text);font-weight:700}
    .country-toggle .country-flag{font-size:18px}
    .country-toggle .country-name{flex:1;text-align:left}
    .country-toggle .country-dial{color:var(--cs-muted);font-weight:600}
    .country-dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--cs-bg);border:1px solid var(--cs-border);border-radius:12px;box-shadow:0 18px 40px rgba(33,10,60,0.12);z-index:2000;padding:10px;max-height:320px;overflow:auto}
    .country-dropdown.hidden{display:none}
    .country-search{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);margin-bottom:8px}
    .country-list{list-style:none;padding:0;margin:0}
    .country-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer}
    .country-item:hover,.country-item[aria-selected="true"]{background:linear-gradient(90deg, rgba(139,92,246,0.06), rgba(139,92,246,0.03));}
    .country-item .flag{width:28px;font-size:18px}
    .country-item .meta{display:flex;flex-direction:column}
    .country-item .name{font-weight:700;color:var(--cs-text)}
    .country-item .code{font-size:13px;color:var(--cs-muted)}
    /* ensure mobile friendliness */
    @media (max-width:720px){.country-select{min-width:140px}.country-toggle{padding:12px;border-radius:10px}}
    </style>
  </head>
  <body>
    <main class="page-wrap">
      <section id="bookingCard" class="card booking-card fade-in-up">
        <div class="logo-circle">LOGO</div>
        <h1>Libra'z Beauty Salon</h1>
        <p class="subtitle">By Asma Naz</p>

        <form id="bookingForm" class="booking-form" novalidate>
          <label for="name">Name *</label>
          <input id="name" name="name" type="text" required placeholder="Enter your name" />

          <label for="phone">Phone Number *</label>
          <div class="phone-field-row">
            <div class="country-select-wrapper">
              <input type="hidden" id="countryCode" name="countryCode" value="+92">
              <div class="country-select" id="countrySelect" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                <button type="button" class="country-toggle" id="countryToggle" aria-label="Select country">
                  <span class="country-flag">🇵🇰</span>
                  <span class="country-name">Pakistan</span>
                  <span class="country-dial">(+92)</span>
                </button>
                <div class="country-dropdown hidden" id="countryDropdown" role="listbox" aria-label="Country list">
                  <input class="country-search" id="countrySearch" placeholder="Search country or code..." aria-label="Search countries" />
                  <ul class="country-list" id="countryList"></ul>
                </div>
              </div>
            </div>
            <input id="phone" name="phone" type="tel" required placeholder="300-1234567" />
          </div>

          <label for="email">Email (Optional)</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" />

          <label for="promoCode">Promo Code (Optional)</label>
          <input id="promoCode" name="promoCode" type="text" placeholder="PROMO2026" />

          <div class="service-selection">
            <label>Select Services *</label>
            <div id="serviceRows" class="service-rows"></div>
            <button id="addServiceBtn" type="button" class="btn-outline">Add More Service</button>
            <div class="total-bill-box">
              <strong>Total Bill:</strong> <span id="totalBillValue">PKR 0</span>
            </div>
          </div>

          <button id="bookNowBtn" type="submit" class="btn-gradient">
            <span class="btn-text">Book Now</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>

        <p class="small-link">
          Admin? <a href="admin.html">Open Dashboard</a>
        </p>
        <p class="small-link">
          <a href="price-list.html">View Full Price List</a>
        </p>
      </section>
    </main>

      const countrySelectRoot = document.getElementById('countrySelect');

      let filtered = countries.slice();
      let highlighted = -1;

      function renderList(){
        countryList.innerHTML = '';
        filtered.forEach((c,idx)=>{
          const li = document.createElement('li');
          li.className = 'country-item';
          li.setAttribute('role','option');
          li.tabIndex = 0;
          li.dataset.index = idx;
          li.innerHTML = `<span class="flag">${c.flag}</span><div class="meta"><span class="name">${c.name}</span><span class="code">(${c.code})</span></div>`;
          li.addEventListener('click', ()=> selectCountry(c));
          li.addEventListener('keydown', (e)=>{
            if(e.key === 'Enter') selectCountry(c);
            if(e.key === 'ArrowDown') { focusItem(idx+1); e.preventDefault(); }
            if(e.key === 'ArrowUp') { focusItem(idx-1); e.preventDefault(); }
          });
          countryList.appendChild(li);
        });
      }

      function openDropdown(){
        countryDropdown.classList.remove('hidden');
        countrySelectRoot.setAttribute('aria-expanded','true');
        highlighted = -1;
        countrySearch.value = '';
        filtered = countries.slice();
        renderList();
        setTimeout(()=>countrySearch.focus(),50);
      }

      function closeDropdown(){
        countryDropdown.classList.add('hidden');
        countrySelectRoot.setAttribute('aria-expanded','false');
        highlighted = -1;
      }

      function selectCountry(c){
        countryHidden.value = c.code;
        countryToggle.querySelector('.country-flag').textContent = c.flag;
        countryToggle.querySelector('.country-name').textContent = c.name;
        countryToggle.querySelector('.country-dial').textContent = `(${c.code})`;
        closeDropdown();
      }

      function filterList(term){
        const t = term.trim().toLowerCase();
        filtered = countries.filter(c=> c.name.toLowerCase().includes(t) || c.code.includes(t));
        renderList();
      }

      function focusItem(index){
        const items = countryList.querySelectorAll('.country-item');
        if(items.length === 0) return;
        if(index < 0) index = items.length -1;
        if(index >= items.length) index = 0;
        items[index].focus();
        highlighted = index;
      }

      countryToggle.addEventListener('click', ()=>{
        if(countryDropdown.classList.contains('hidden')) openDropdown(); else closeDropdown();
      });

      countrySelectRoot.addEventListener('keydown', (e)=>{
        if(e.key === 'ArrowDown') { openDropdown(); e.preventDefault(); }
        if(e.key === 'Escape') { closeDropdown(); }
      });

      countrySearch.addEventListener('input', (e)=> filterList(e.target.value));

      document.addEventListener('click', (e)=>{
        if(!countrySelectRoot.contains(e.target)) closeDropdown();
      });

      // default to Pakistan
      const defaultCountry = countries.find(c=> c.name === 'Pakistan') || countries[0];
      if(defaultCountry) selectCountry(defaultCountry);

      // render initial list (in case user opens)
      renderList();
    })();

<script src="script.js"></script>
   <script> 
document.getElementById("bookingForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const promoCode = document.getElementById("promoCode").value;

  fetch("/api/book", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      phone,
      email,
      promoCode
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    console.log(data);
  })
  .catch(err => {
    console.error("Error:", err);
  });
});
</script>
